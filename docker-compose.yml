services:
  postgres:
    image: postgres:16-alpine
    container_name: favenora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: favenora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "12345:5432"
    volumes:
      - favenora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  favenora_postgres_data:
